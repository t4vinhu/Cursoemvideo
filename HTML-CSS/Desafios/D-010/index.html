<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Centralização de Imagens</title>
    <style>
        body{
            background: black url('espaco.jpg') top center / cover no-repeat fixed;
        }
        
        img{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="center">
        <img src="astronauta.png" alt="">
    </div>
</body>
</html>
