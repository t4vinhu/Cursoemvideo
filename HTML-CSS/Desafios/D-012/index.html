<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: Layout com Grid</title>
    <style>
        div.cont{
            display: grid;
            border: 4px dashed black;
            grid-template: 2fr 1fr 4fr 1fr / 1fr 2fr 1fr;
            gap: 3px;
            max-width: 100vw;
            height: 100vh;
        }
        .item{
            border: 2px dashed blue;
        }

        header{
            background-color: burlywood;
            grid-area: 1 / 1 / 2 / -1;
        }
        nav{
            background-color: darksalmon;
            grid-area: 2 / 1 / 3 / -1;
        }
        main{
            background-color: bisque;
            grid-area: 3 / 1 / 4 / -2;
        }
        aside{
            background-color: indianred;
            grid-area: 3 / 3 / 4 / -1;
        }
        footer{
            background-color: chocolate;
            grid-area: -2 / 1 / -1 / -1;
        }
    </style>
</head>
<body>
    <div class="cont">
        <header class="item">
            Cabeçalho
        </header>
        <nav class="item">
            Menu
        </nav>
        <main class="item">
           Principal
        </main>
        <aside>
            Periférico
        </aside>
        <footer class="item">
            Rodapé
        </footer>
    </div>
</body>
</html>
