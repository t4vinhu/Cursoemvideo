<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e Quebras</h1>
    <p>Lorem ipsum dolor sit amet <br> consectetur adipisicing elit.</p>
    <!-- <br>: Tag usada para quebrar parágrafos. -->

    <h1>Símbolos</h1>
    &reg;
    &copy;
    &trade;
    &euro;
    &pound;
    &yen;
    &cent;
    &phi;
    <!-- &: Caractere para símbolos. -->

    <h1>Emoji</h1>
    &#x1F596;
    <!-- & é usado junto com um código hexadecimal começando com #x. O código de cada emoji pode ser visto na Emojipedia. -->
</body>
</html>
