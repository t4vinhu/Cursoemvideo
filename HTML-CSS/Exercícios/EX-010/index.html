<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <p>CLique <a target="_blank" rel="external" href="https://www.youtube.com/">aqui</a> para abrir o Youtube.</p>

    <p>ou clique <a rel="next" href="pag2.html">aqui</a> para ver outra página.</p>

    <p>Baixe um livro aqui: <a download="desafio-mensagens.pdf" type="application/pdf" href="livro/desafio-mensagens.pdf">Download</a></p>
    <!-- 
        <a>: Tag de link.
        Em caso de links externos, deve se usar o parâmetro target com valor '_blank' para que a página abra em uma nova aba (opcionalmente com rel="external").
        Nos links internos, pode se usar rel="next/prev".
        Há também o rel="nofollow", usado com links não endorsados.
    -->
</body>
</html>
