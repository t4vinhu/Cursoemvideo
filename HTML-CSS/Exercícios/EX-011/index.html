<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotop.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/fotom.png" type="image/png">
        <img src="imagens/fotog.png" alt="">
    </picture>

    <!-- <picture>: Tag usada para fazer imagens responsivas, o elemento principal é representado com a tag <img>, enquanto os outros pela tag <source> (o ponto de quebra é configurado com o parâmetro min/max-width). -->

    <!-- <audio>: Tag para colocar áudios no HTML, deve ter os parâmetros autoplay e controls. Compatível com MP3, WAV e OGG (Detalhe: os arquivos WAV são mais pesados). -->
</body>
</html>
