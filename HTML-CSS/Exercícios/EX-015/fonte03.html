<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas Baixadas</title>
    <style>
        @font-face {
            font-family: 'Super Mario 256';
            src: url('SuperMario256.ttf') format('truetype');
        }
        /* @font-face: regra para importar fontes baixadas. */

        /* 
        Tipos de formato:
        opentype
        truetype
        embedded-opentype
        truetype-aat
        svg
        */

        body{
            font-family: 'Super Mario 256';
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>It'sa me, Mario!</h1>
    
</body>
</html>
