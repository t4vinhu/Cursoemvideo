<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasse: Hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        div:hover{
            color: rgb(34, 0, 255);
        }
        div img{
            display: none;
        }
        div:hover img{
            display: block;
        }
        /* > = Dentro de */
    </style>
</head>
<body>
    <h1>Passe o mouse sobre o texto abaixo:</h1>
    <div>
        Você não vai se arrepender <br>
        <img src="bear5.jpg" alt="bu">
    </div>
</body>
</html>
