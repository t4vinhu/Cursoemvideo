<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div{
            display: inline-block;
            background-color: rgb(180, 180, 180);
            border: 1px dashed black;
            text-align: center;
            width: 200px;
            height: 200px;
        }
        /* Pseudo-classes: Representadas por :, relacionadas ao estado do objeto */
        div:hover{
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
