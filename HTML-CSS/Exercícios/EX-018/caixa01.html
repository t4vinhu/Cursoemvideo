<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            background-color: rgb(182, 182, 182);
            height: 300px;
            width: 300px;
            border: 10px solid black;
            padding: 10px;
            margin: auto;
            outline: 3px dashed red;
        }
        a{
            width: 300px;
            border: 5px dashed red;
            padding: 5px;
        }

        /* 
        Partes de uma caixa (de fora para dentro):
        margin
        outline
        border
        padding
        conteúdo
        */
    </style>
</head>
<body>
    <h1>Os títulos são exemplos de box-level</h1>
    <p>assim como os parágrafos. Já os <a href="#">links</a> são exemplos de inline-level.</p>

</body>
</html>
