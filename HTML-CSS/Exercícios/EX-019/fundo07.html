<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens de Fundo</title>
    <style>
        #cont{
            height: 95vh;
            background-color: hotpink;
            background-image: url('imagens/target001.png');
            background-size: 100% 100%;
            padding: 10px;
            position: relative;
        }
        /* Container = relativo, Conteúdo = absoluto */
        #content{
            height: 200px;
            width: 400px;
            background-color: mintcream;
            background-image: url('imagens/target001.png');
            background-size: 100% 100%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <section id="cont">
        <article id="content">

        </article>
    </section>
</body>
</html>
