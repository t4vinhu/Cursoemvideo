<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table{
            height: 400px;
            width: 400px;
            border-collapse: collapse;
            /* Bordas sem espaço entre elas */
        }
        td{
            border: 1px solid black;
            padding: 8px;
            text-align: right;
            /* Alinhamento horizontal */
            vertical-align: middle;
            /* Alinhamento vertical */
        }
    </style>
</head>
<body>
    <!-- Delimitação de toda tabela -->
    <table>
        <!--
        Hierarquia de tabelas simples:
        table
        table rows
        table header
        table data
        -->
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
    </table>
</body>
</html>
