<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        caption{
            font-size: 1.3em;
            font-weight: bolder;
        }
        table{
            border-collapse: collapse;
            width: 500px;
        }
        th{
            text-align: center;
        }
        td, th{
            border: 1px solid black;
            padding: 5px;
        }
        col#c3{
            background-color: wheat;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col id="c1">
            <col id="c2">
            <col span="3" id="c3">
        </colgroup>
        <!-- Agrupamento de colunas -->

        <caption>Filmes Favoritos</caption>
        <tr>
            <th scope="col" id="c1">Grupos</th>
            <th scope="col" id="c2">Nomes</th>
            <th scope="colgroup" colspan="3" id="c3">Filmes</th>
        </tr>
        <tr>
            <th scope="rowgroup" rowspan="3">Mulheres</th>
            <td>Ana Maria</td>
            <td>Alien</td>
            <td>Rambo</td>
            <td>Vingadores</td>
        </tr>
        <tr>
            <td>Beatriz</td>
            <td>Hulk</td>
            <td>Inception</td>
            <td>Batman</td>
        </tr>
        <tr>
            <td>Cláudia</td>
            <td>Oblivion</td>
            <td>Matrix</td>
            <td>Big Hero</td>
        </tr>
        <tr>
            <th scope="rowgroup" rowspan="3">Homens</th>
            <td>Bruno</td>
            <td>Intocáveis</td>
            <td>Amnésia</td>
            <td>Gladiador</td>
        </tr>
        <tr>
            <td>Daniel</td>
            <td>Wall-E</td>
            <td>Oldboy</td>
            <td>Dangal</td>
        </tr>
        <tr>
            <td>Fabiano</td>
            <td>Star Wars 5</td>
            <td>Taxi Driver</td>
            <td>Toy Story</td>
        </tr>
    </table>
</body>
</html>
