<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
</head>
<body>
    <p>Acesse o site do Cursoemvideo:</p>
    <!-- O tamanho padrão de um Iframe é de 300x150 (px) -->
    <iframe src="https://cursoemvideo.com" frameborder="0" height="500" width="300" scrolling="yes">
        <!-- Os Iframes já possuem configurações de tamanho, mas elas são sobrepostas caso existam configurações nas CSS -->
        Parece que seu navegador não é compatível com Iframes, então aqui está
        um <a target="_blank" href="https://cursoemvideo.com">link para o site</a>.
    </iframe>
</body>
</html>
