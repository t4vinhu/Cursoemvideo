<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <form action="" method="post">
        <p>
            <label for="icor">Cor:</label>
            <input type="color" name="cor" id="icor">
        </p>
        <p>
            <label for="irange">Dê uma nota:</label>
            <input type="range" name="range" id="irange">
        </p>
        <p>
            <label for="iarq">Arquivo:</label>
            <input type="file" name="arq" id="iarq">
            <!-- é preciso usar o método post para esse tipo de input -->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
