<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }
        body{
            background-color: rgb(255, 172, 142);
        }
        main{
            display: flex;
            background-color: darkorange;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
        }
        section{
            background-color: crimson;
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>Teste de Centralização</h1>
        </section>
    </main>
</body>
</html>
