<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.cont{
            display: flex;
            flex-flow: row wrap;
            align-items: center;
            background-color: darkblue;
            height: 400px;
        }
        div.item{
            background-color: cornflowerblue;
            border: 1px solid black;
            padding: 40px;
            text-align: center;
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div id="i1" class="item">a</div>
        <div id="i2" class="item">b</div>
        <div id="i3" class="item">c</div>
        <div id="i4" class="item">d</div>
        <div id="i5" class="item">e</div>
        <div id="i6" class="item">f</div>
        <div id="i7" class="item">g</div>
        <div id="i7" class="item">h</div>
        <div id="i7" class="item">i</div>
        <div id="i7" class="item">j</div>
        <div id="i7" class="item">k</div>
        <div id="i7" class="item">l</div>
        <div id="i7" class="item">n</div>
    </div>
</body>
</html>
