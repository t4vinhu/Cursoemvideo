<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.cont{
            display: flex;
            flex-flow: row nowrap;
            background-color: darkblue;
        }
        div.item{
            background-color: cornflowerblue;
            border: 1px solid black;
            text-align: center;
            text-transform: capitalize;
            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 1;
            /*
            Por padrão:
            flex-grow = 0
            flex-shrink = 1
            */
        }
    </style>
</head>
<body>
    <div class="cont">
        <div id="i1" class="item">a</div>
        <div id="i2" class="item">b</div>
        <div id="i3" class="item">c</div>
    </div>
</body>
</html>
